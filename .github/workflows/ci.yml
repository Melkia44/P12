name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & tests unitaires
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sds
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: sds_poc
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sds"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt && pip install ruff
      - run: ruff check pipeline/ config/ run_pipeline.py tests/
      - env:
          PGPASSWORD: test_password
        run: |
          sudo apt-get -y install postgresql-client
          psql -h localhost -U sds -d sds_poc -f sql/01_schema.sql
      - env:
          DATABASE_URL: postgresql+psycopg://sds:test_password@localhost:5432/sds_poc
        run: pytest tests/ --cov=pipeline --cov-fail-under=50
