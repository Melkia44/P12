# ═══════════════════════════════════════════════════════════════════════
#  Sport Data Solution — Flow Kestra principal
#
#  7 étapes du pipeline + finalize, orchestrées via l'image sds-pipeline.
#  Les secrets et paramètres d'infra passent par les variables globales
#  Kestra (définies dans docker-compose.yml, service kestra) :
#     {{ globals['database-url'] }}        — URL SQLAlchemy
#     {{ globals['google-maps-api-key'] }} — clé géocodeur (vide = fallback OSM)
#     {{ globals['slack-webhook-url'] }}   — webhook Slack (vide = simulation)
#     {{ globals['project-path'] }}        — racine projet côté host
#
#  Paramètres métier exposés dans l'UI : Juliette peut les ajuster avant
#  chaque exécution sans toucher au code.
# ═══════════════════════════════════════════════════════════════════════
id: sds_pipeline
namespace: sds.poc
description: |
  Pipeline de récompenses sportives — orchestration Kestra.

  7 étapes enchaînées + finalize :
    1. extract         — Excel RH/Sport → PostgreSQL raw.*
    2. generate        — Simulateur Strava-like 12 mois
    3. validate_geo    — Distance domicile / siège + seuils métier
    4. data_quality    — Great Expectations + scoring /100 (BLOQUANT)
    5. transform       — Règles métier (prime 5% + 5j bien-être) + row_hash
    6. load            — Export Excel 8 feuilles pour PowerBI
    7. notify_slack    — Slack individuel + récap global
    8. finalize        — UPDATE monitoring.pipeline_runs (KPI + durée)

# ─── Paramètres exposés dans l'UI ───────────────────────────────────────
inputs:
  - id: taux_prime
    type: FLOAT
    defaults: 0.05
    description: "Taux de la prime sportive (0.05 = 5%)."

  - id: seuil_activites
    type: INT
    defaults: 15
    description: "Nombre minimum d'activités / an pour être éligible aux jours bien-être."

  - id: dq_threshold
    type: INT
    defaults: 80
    description: "Score DQ minimum pour que le pipeline continue (sinon blocage)."

  - id: individual_msgs
    type: INT
    defaults: 3
    description: "Nombre de notifications Slack individuelles envoyées en fin de run."

# ─── Variables locales du flow ──────────────────────────────────────────
variables:
  image:   "sds-pipeline:latest"
  network: "sds_network"

# ─── Tâches (DAG linéaire) ──────────────────────────────────────────────
tasks:
  - id: extract
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Charge les fichiers Excel sources (RH + Sport) dans PostgreSQL."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    env:
      DATABASE_URL:     "{{ globals['database-url'] }}"
      PIPELINE_VERSION: "3.1.0"
      TAUX_PRIME:       "{{ inputs.taux_prime }}"
      MIN_ACTIVITES_AN: "{{ inputs.seuil_activites }}"
      DQ_THRESHOLD:     "{{ inputs.dq_threshold }}"
    commands:
      - python -m pipeline.extract --run-id "{{ execution.id }}"

  - id: generate
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Génère 12 mois d'activités sportives simulées (seed=42)."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    env:
      DATABASE_URL: "{{ globals['database-url'] }}"
    commands:
      - python -m pipeline.generateur_strava --run-id "{{ execution.id }}"

  - id: validate_geo
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Géocode les adresses, calcule distance au siège, valide contre les seuils 15/25 km."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    retry:
      type: constant
      interval: PT30S
      maxAttempt: 3
    env:
      DATABASE_URL:        "{{ globals['database-url'] }}"
      GOOGLE_MAPS_API_KEY: "{{ globals['google-maps-api-key'] }}"
    commands:
      - python -m pipeline.validation_geo --run-id "{{ execution.id }}"

  - id: data_quality
    type: io.kestra.plugin.scripts.shell.Commands
    description: "GE + scoring métier /100. Exit code 2 si score < dq_threshold → pipeline stoppé."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    env:
      DATABASE_URL:     "{{ globals['database-url'] }}"
      DQ_THRESHOLD:     "{{ inputs.dq_threshold }}"
      PIPELINE_VERSION: "3.1.0"
    commands:
      # stderr→stdout : tqdm (Great Expectations) écrit sur stderr, Kestra flag WARN sinon
      - python -m pipeline.data_quality_ge --run-id "{{ execution.id }}" 2>&1

  - id: transform
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Applique les règles prime 5% et seuil 15 activités. Génère row_hash MD5."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    env:
      DATABASE_URL:     "{{ globals['database-url'] }}"
      PIPELINE_VERSION: "3.1.0"
      TAUX_PRIME:       "{{ inputs.taux_prime }}"
      MIN_ACTIVITES_AN: "{{ inputs.seuil_activites }}"
    commands:
      - python -m pipeline.transform --run-id "{{ execution.id }}"

  - id: load
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Écrit output/sport_rewards_v3_*.xlsx (8 feuilles)."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
      volumes:
        - "{{ globals['project-path'] }}/output:/app/output"
    env:
      DATABASE_URL: "{{ globals['database-url'] }}"
    commands:
      - python -m pipeline.load --run-id "{{ execution.id }}"

  - id: notify_slack
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Récap global + N messages individuels (Block Kit)."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    env:
      DATABASE_URL:      "{{ globals['database-url'] }}"
      SLACK_WEBHOOK_URL: "{{ globals['slack-webhook-url'] }}"
      PIPELINE_VERSION:  "3.1.0"
    commands:
      - python -m pipeline.slack_notifier --run-id "{{ execution.id }}" --individual {{ inputs.individual_msgs }}

  - id: finalize_monitoring
    type: io.kestra.plugin.scripts.shell.Commands
    description: "UPDATE monitoring.pipeline_runs avec les KPI finaux et la durée totale."
    containerImage: "{{ vars.image }}"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: "{{ vars.network }}"
      pullPolicy: IF_NOT_PRESENT
    env:
      DATABASE_URL: "{{ globals['database-url'] }}"
    commands:
      - python -m pipeline.monitoring finalize --run-id "{{ execution.id }}" --duration 0

# ─── Scheduling automatique ────────────────────────────────────────────
triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 2 * * *"
    description: "Exécution automatique chaque nuit à 02:00 (heure de Paris)."
